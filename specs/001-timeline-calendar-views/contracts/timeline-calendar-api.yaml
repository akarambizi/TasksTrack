openapi: 3.0.3
info:
  title: TasksTrack Timeline and Calendar API
  version: 0.1.0
  description: >-
    Contract for calendar/timeline history retrieval and day-detail interactions
    under existing authenticated focus-session domain.
servers:
  - url: /
security:
  - bearerAuth: []
paths:
  /api/focus/history/calendar:
    get:
      summary: Get calendar day summaries for a date range
      tags: [FocusHistory]
      parameters:
        - in: query
          name: startDate
          required: true
          schema:
            type: string
            format: date
        - in: query
          name: endDate
          required: true
          schema:
            type: string
            format: date
        - in: query
          name: timezone
          required: true
          schema:
            type: string
          description: IANA timezone identifier (for example Africa/Kigali)
        - in: query
          name: habitId
          required: false
          schema:
            type: integer
            minimum: 1
        - in: query
          name: category
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Calendar day summaries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalendarHistoryResponse'
        '400':
          description: Invalid date/filter/timezone input
        '401':
          description: Unauthorized
        '500':
          description: Server error

  /api/focus/history/timeline:
    get:
      summary: Get timeline grouped session history for a date range
      tags: [FocusHistory]
      parameters:
        - in: query
          name: startDate
          required: true
          schema:
            type: string
            format: date
        - in: query
          name: endDate
          required: true
          schema:
            type: string
            format: date
        - in: query
          name: timezone
          required: true
          schema:
            type: string
        - in: query
          name: habitId
          required: false
          schema:
            type: integer
            minimum: 1
        - in: query
          name: category
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Timeline day groups
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimelineHistoryResponse'
        '400':
          description: Invalid date/filter/timezone input
        '401':
          description: Unauthorized
        '500':
          description: Server error

  /api/focus/history/day/{localDate}:
    get:
      summary: Get detailed sessions and planning overlays for one local day
      tags: [FocusHistory]
      parameters:
        - in: path
          name: localDate
          required: true
          schema:
            type: string
            format: date
        - in: query
          name: timezone
          required: true
          schema:
            type: string
        - in: query
          name: habitId
          required: false
          schema:
            type: integer
            minimum: 1
        - in: query
          name: category
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Day details with sessions and planning entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DayDetailResponse'
        '400':
          description: Invalid date/filter/timezone input
        '401':
          description: Unauthorized
        '404':
          description: Day not found in selected range/filters
        '500':
          description: Server error

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    CalendarHistoryResponse:
      type: object
      required: [startDate, endDate, timezone, days]
      properties:
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        timezone:
          type: string
        days:
          type: array
          items:
            $ref: '#/components/schemas/CalendarDaySummary'

    CalendarDaySummary:
      type: object
      required:
        - localDate
        - isActive
        - sessionCount
        - totalFocusMinutes
        - completedSessionCount
      properties:
        localDate:
          type: string
          format: date
        isActive:
          type: boolean
        sessionCount:
          type: integer
          minimum: 0
        totalFocusMinutes:
          type: integer
          minimum: 0
        completedSessionCount:
          type: integer
          minimum: 0
        habitIds:
          type: array
          items:
            type: integer
        categories:
          type: array
          items:
            type: string

    TimelineHistoryResponse:
      type: object
      required: [startDate, endDate, timezone, groups]
      properties:
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        timezone:
          type: string
        groups:
          type: array
          items:
            $ref: '#/components/schemas/TimelineDayGroup'

    TimelineDayGroup:
      type: object
      required: [localDate, totalFocusMinutes, sessions]
      properties:
        localDate:
          type: string
          format: date
        displayLabel:
          type: string
        totalFocusMinutes:
          type: integer
          minimum: 0
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/SessionTimelineItem'

    SessionTimelineItem:
      type: object
      required:
        - sessionId
        - habitId
        - habitName
        - startTimeUtc
        - startTimeLocal
        - status
        - durationMinutes
      properties:
        sessionId:
          type: integer
        habitId:
          type: integer
        habitName:
          type: string
        category:
          type: string
          nullable: true
        startTimeUtc:
          type: string
          format: date-time
        endTimeUtc:
          type: string
          format: date-time
          nullable: true
        startTimeLocal:
          type: string
          format: date-time
        endTimeLocal:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          enum: [active, paused, completed, interrupted]
        durationMinutes:
          type: integer
          minimum: 0
        notes:
          type: string
          nullable: true

    DayDetailResponse:
      type: object
      required: [localDate, timezone, summary, sessions]
      properties:
        localDate:
          type: string
          format: date
        timezone:
          type: string
        summary:
          $ref: '#/components/schemas/CalendarDaySummary'
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/SessionTimelineItem'
        planningEntries:
          type: array
          description: Existing-domain planning entries relevant to selected day/category
          items:
            $ref: '#/components/schemas/PlanningEntryView'

    PlanningEntryView:
      type: object
      required: [id, categoryId, isActive]
      properties:
        id:
          type: integer
        categoryId:
          type: integer
        categoryName:
          type: string
        isActive:
          type: boolean
        weeklyTargetMinutes:
          type: integer
          nullable: true
        weeklyTargetSessions:
          type: integer
          nullable: true
        dailyTargetMinutes:
          type: integer
          nullable: true
        dailyTargetSessions:
          type: integer
          nullable: true
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
          nullable: true
